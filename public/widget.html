<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Crypto Monitor</title>
  <style>
    :root {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      --blue: #111bf5;
      --green: #16a34a;
      --red: #dc2626;
      --bg: #f6f8fb;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0b0b0f;
      --muted: #64748b;
      --row-hover: #f1f5ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; background: var(--bg); color: var(--text); }
    body { padding: 16px; }

    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(15,23,42,0.08);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .header h2 { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }
    .header-right { display: flex; gap: 8px; align-items: center; }

    /* ── Filter pills ── */
    .filter-group { display: flex; gap: 6px; }
    .pill {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .pill.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 8px 12px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-align: right;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      background: #fafbfd;
      border-bottom: 1px solid var(--border);
    }
    thead th:first-child { text-align: left; padding-left: 20px; }
    thead th:last-child { padding-right: 20px; }
    thead th.sorted { color: var(--blue); }
    .sort-arrow { margin-left: 3px; font-size: 0.65rem; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }

    td {
      padding: 11px 12px;
      font-size: 0.85rem;
      text-align: right;
      vertical-align: middle;
    }
    td:first-child { text-align: left; padding-left: 20px; }
    td:last-child { padding-right: 20px; }

    .coin-info { display: flex; align-items: center; gap: 10px; }
    .coin-symbol {
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      font-size: 0.7rem;
      padding: 3px 7px;
      border-radius: 6px;
      min-width: 38px;
      text-align: center;
    }
    .coin-name { font-weight: 600; font-size: 0.88rem; }
    .coin-rank { font-size: 0.72rem; color: var(--muted); }

    .change-up { color: var(--green); font-weight: 600; }
    .change-down { color: var(--red); font-weight: 600; }
    .price { font-weight: 600; font-variant-numeric: tabular-nums; }
    .mcap { color: var(--muted); font-size: 0.82rem; }

    /* ── Detail panel ── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 10;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 20px 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 -4px 40px rgba(15,23,42,0.15);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .detail-symbol {
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      padding: 5px 12px;
      border-radius: 10px;
    }
    .detail-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; }
    .detail-rank { font-size: 0.78rem; color: var(--muted); }
    .close-btn {
      background: var(--border);
      border: none;
      width: 30px; height: 30px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    .detail-price {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .detail-change { font-size: 0.9rem; font-weight: 600; margin-bottom: 20px; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .detail-stat {
      background: var(--bg);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .stat-label { font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .stat-value { font-size: 0.88rem; font-weight: 700; }

    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h2>🪙 Crypto Markets</h2>
      <div class="header-right">
        <div class="filter-group" id="filter-group">
          <button class="pill active" data-filter="all">All</button>
          <button class="pill" data-filter="up">▲ Up</button>
          <button class="pill" data-filter="down">▼ Down</button>
        </div>
      </div>
    </div>

    <div id="table-wrap">
      <div class="loading">Loading market data…</div>
    </div>
  </div>

  <!-- Detail overlay (Interaction 2: drill-down) -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-panel" id="detail-panel">
      <div class="detail-top">
        <div>
          <div class="detail-name" id="d-name"></div>
          <div class="detail-rank" id="d-rank"></div>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <span class="detail-symbol" id="d-symbol"></span>
          <button class="close-btn" id="close-detail">✕</button>
        </div>
      </div>
      <div class="detail-price" id="d-price"></div>
      <div class="detail-change" id="d-change"></div>
      <div class="detail-grid" id="d-grid"></div>
    </div>
  </div>

<script type="module">
  // ── State ──────────────────────────────────────────────────────────────
  let cryptos = [...(window.openai?.toolOutput?.cryptos ?? [])];

  // Rehydrate UI state (sort + filter) persisted from previous renders
  const savedState = window.openai?.widgetState ?? {};
  let sortKey    = savedState.sortKey    ?? "market_cap";
  let sortDir    = savedState.sortDir    ?? "desc";
  let filter     = savedState.filter     ?? "all";
  let selectedId = savedState.selectedId ?? null;

  // ── Helpers ────────────────────────────────────────────────────────────
  const fmt = {
    price: (n) => n >= 1
      ? "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : "$" + n.toFixed(6),
    mcap:  (n) => {
      if (n >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
      if (n >= 1e9)  return "$" + (n / 1e9).toFixed(2)  + "B";
      if (n >= 1e6)  return "$" + (n / 1e6).toFixed(2)  + "M";
      return "$" + n.toLocaleString();
    },
    pct: (n) => (n >= 0 ? "+" : "") + n.toFixed(2) + "%",
  };

  function persistState() {
    window.openai?.setWidgetState?.({ sortKey, sortDir, filter, selectedId });
  }

  // ── Interaction 1: Sort ────────────────────────────────────────────────
  function sortedData() {
    let data = [...cryptos];
    if (filter === "up")   data = data.filter(c => c.price_change_percentage_24h >= 0);
    if (filter === "down") data = data.filter(c => c.price_change_percentage_24h <  0);
    data.sort((a, b) => {
      const av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
      return sortDir === "asc" ? av - bv : bv - av;
    });
    return data;
  }

  function setSort(key) {
    if (sortKey === key) sortDir = sortDir === "desc" ? "asc" : "desc";
    else { sortKey = key; sortDir = "desc"; }
    persistState();
    renderTable();
  }

  // ── Interaction 2: Drill-down detail panel ─────────────────────────────
  function openDetail(coin) {
    selectedId = coin.id;
    persistState();

    const pct = coin.price_change_percentage_24h;
    document.getElementById("d-name").textContent    = coin.name;
    document.getElementById("d-rank").textContent    = `Rank #${coin.rank ?? "—"}`;
    document.getElementById("d-symbol").textContent  = coin.symbol;
    document.getElementById("d-price").textContent   = fmt.price(coin.current_price);
    const changeEl = document.getElementById("d-change");
    changeEl.textContent  = fmt.pct(pct) + " (24h)";
    changeEl.className    = "detail-change " + (pct >= 0 ? "change-up" : "change-down");

    const stats = [
      { label: "Market Cap",   value: fmt.mcap(coin.market_cap) },
      { label: "24h Volume",   value: coin.volume_24h   ? fmt.mcap(coin.volume_24h)   : "—" },
      { label: "7d Change",    value: coin.change_7d    ? fmt.pct(coin.change_7d)     : "—" },
      { label: "30d Change",   value: coin.change_30d   ? fmt.pct(coin.change_30d)    : "—" },
      { label: "ATH",          value: coin.ath          ? fmt.price(coin.ath)         : "—" },
      { label: "Circulating",  value: coin.circulating  ? fmt.mcap(coin.circulating)  : "—" },
    ];

    document.getElementById("d-grid").innerHTML = stats.map(s => `
      <div class="detail-stat">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value">${s.value}</div>
      </div>`).join("");

    document.getElementById("detail-overlay").classList.add("open");
  }

  function closeDetail() {
    selectedId = null;
    persistState();
    document.getElementById("detail-overlay").classList.remove("open");
  }

  document.getElementById("close-detail").addEventListener("click", closeDetail);
  document.getElementById("detail-overlay").addEventListener("click", (e) => {
    if (e.target === document.getElementById("detail-overlay")) closeDetail();
  });

  // ── Render table ───────────────────────────────────────────────────────
  function thArrow(key) {
    if (sortKey !== key) return "";
    return `<span class="sort-arrow">${sortDir === "desc" ? "▼" : "▲"}</span>`;
  }

  function renderTable() {
    const wrap = document.getElementById("table-wrap");
    const data = sortedData();

    if (!data.length) {
      wrap.innerHTML = `<div class="empty">No coins match this filter.</div>`;
      return;
    }

    // Update filter pills
    document.querySelectorAll(".pill").forEach(p => {
      p.classList.toggle("active", p.dataset.filter === filter);
    });

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th data-sort="name">Coin</th>
            <th data-sort="current_price" class="${sortKey==="current_price"?"sorted":""}">
              Price ${thArrow("current_price")}
            </th>
            <th data-sort="price_change_percentage_24h" class="${sortKey==="price_change_percentage_24h"?"sorted":""}">
              24h ${thArrow("price_change_percentage_24h")}
            </th>
            <th data-sort="market_cap" class="${sortKey==="market_cap"?"sorted":""}">
              Mkt Cap ${thArrow("market_cap")}
            </th>
          </tr>
        </thead>
        <tbody>
          ${data.map((c, i) => {
            const pct = c.price_change_percentage_24h;
            return `<tr data-id="${c.id}">
              <td>
                <div class="coin-info">
                  <span class="coin-symbol">${c.symbol}</span>
                  <div>
                    <div class="coin-name">${c.name}</div>
                    <div class="coin-rank">#${c.rank ?? i+1}</div>
                  </div>
                </div>
              </td>
              <td class="price">${fmt.price(c.current_price)}</td>
              <td class="${pct >= 0 ? "change-up" : "change-down"}">${fmt.pct(pct)}</td>
              <td class="mcap">${fmt.mcap(c.market_cap)}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`;

    // Sort click handlers
    wrap.querySelectorAll("th[data-sort]").forEach(th => {
      th.addEventListener("click", () => setSort(th.dataset.sort));
    });

    // Row click → drill-down
    wrap.querySelectorAll("tbody tr").forEach(row => {
      row.addEventListener("click", () => {
        const coin = cryptos.find(c => c.id === row.dataset.id);
        if (coin) openDetail(coin);
      });
    });

    // Restore open detail if there was one
    if (selectedId) {
      const coin = cryptos.find(c => c.id === selectedId);
      if (coin) openDetail(coin);
    }
  }

  // ── Filter pill clicks ─────────────────────────────────────────────────
  document.getElementById("filter-group").addEventListener("click", (e) => {
    const pill = e.target.closest(".pill");
    if (!pill) return;
    filter = pill.dataset.filter;
    persistState();
    renderTable();
  });

  // ── Athena re-injection (openai:set_globals) ───────────────────────────
  window.addEventListener("openai:set_globals", (e) => {
    const globals = e.detail?.globals;
    if (globals?.toolOutput?.cryptos) {
      cryptos = globals.toolOutput.cryptos;
      renderTable();
    }
  }, { passive: true });

  // ── Initial render ─────────────────────────────────────────────────────
  if (cryptos.length) {
    renderTable();
  } else {
    // If Athena hasn't injected data yet, try calling the tool directly
    if (window.openai?.callTool) {
      window.openai.callTool("get_crypto_data", { limit: 20 }).then(resp => {
        if (resp?.structuredContent?.cryptos) {
          cryptos = resp.structuredContent.cryptos;
          renderTable();
        }
      });
    }
  }

  res.writeHead(200, {
    "content-type": "text/html",
    "Access-Control-Allow-Origin": "*",
  }).end(widgetHtml);
  return;
}
</script>
</body>
</html>
