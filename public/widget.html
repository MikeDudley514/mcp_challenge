<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Crypto Markets</title>
  <style>
    :root {
      --accent: #f7931a;
      --green: #16a34a;
      --red: #dc2626;
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #8892a4;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body { padding: 16px; }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    #status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      text-align: right;
      padding: 8px 10px;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:first-child { text-align: left; }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }

    tbody tr:hover { background: var(--surface); }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 10px 10px;
      text-align: right;
      white-space: nowrap;
    }

    td:first-child { text-align: left; }

    .coin-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rank {
      color: var(--muted);
      font-size: 0.75rem;
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .coin-info { display: flex; flex-direction: column; }
    .coin-symbol { font-weight: 700; font-size: 0.9rem; }
    .coin-name { font-size: 0.72rem; color: var(--muted); }

    .up { color: var(--green); }
    .down { color: var(--red); }
    .neutral { color: var(--muted); }

    .price { font-weight: 600; }

    #detail-panel {
      display: none;
      margin-top: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    #detail-panel.open { display: block; }

    #detail-panel h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #detail-panel h2 button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .detail-item label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }

    .detail-item span {
      font-size: 0.9rem;
      font-weight: 600;
    }

    #empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>Crypto Markets</h1>
  </header>

  <div id="status"><span class="spinner"></span>Loading market data…</div>

  <table id="table" style="display:none">
    <thead>
      <tr>
        <th data-col="rank">#</th>
        <th data-col="price">Price</th>
        <th data-col="change24">24h %</th>
        <th data-col="change7">7d %</th>
        <th data-col="mcap">Market Cap</th>
        <th data-col="vol">Volume 24h</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div id="detail-panel">
    <h2>
      <span id="detail-title">—</span>
      <button id="detail-close">✕</button>
    </h2>
    <div class="detail-grid" id="detail-grid"></div>
  </div>

  <div id="empty" style="display:none">No data available.</div>

  <script type="module">
    // ── helpers ──────────────────────────────────────────────────────────────
    const fmt = (n, dec = 2) =>
      n == null ? '—' : Number(n).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });

    const fmtPrice = (n) => {
      if (n == null) return '—';
      if (n >= 1000) return '$' + fmt(n, 0);
      if (n >= 1)    return '$' + fmt(n, 2);
      if (n >= 0.01) return '$' + fmt(n, 4);
      return '$' + Number(n).toExponential(2);
    };

    const fmtBig = (n) => {
      if (n == null) return '—';
      if (n >= 1e12) return '$' + fmt(n / 1e12, 2) + 'T';
      if (n >= 1e9)  return '$' + fmt(n / 1e9, 2) + 'B';
      if (n >= 1e6)  return '$' + fmt(n / 1e6, 2) + 'M';
      return '$' + fmt(n, 0);
    };

    const changeClass = (v) => v == null ? 'neutral' : v > 0 ? 'up' : v < 0 ? 'down' : 'neutral';
    const changeText = (v) => v == null ? '—' : (v > 0 ? '+' : '') + fmt(v) + '%';

    // ── state ────────────────────────────────────────────────────────────────
    let cryptos = [];
    let sortCol = 'rank';
    let sortAsc = true;
    let selectedId = null;

    const statusEl  = document.getElementById('status');
    const tableEl   = document.getElementById('table');
    const tbodyEl   = document.getElementById('tbody');
    const emptyEl   = document.getElementById('empty');
    const detailEl  = document.getElementById('detail-panel');
    const detailTitle = document.getElementById('detail-title');
    const detailGrid  = document.getElementById('detail-grid');

    // ── render ───────────────────────────────────────────────────────────────
    function render() {
      if (!cryptos.length) {
        statusEl.style.display = 'none';
        tableEl.style.display  = 'none';
        emptyEl.style.display  = 'block';
        return;
      }

      statusEl.style.display = 'none';
      tableEl.style.display  = 'table';
      emptyEl.style.display  = 'none';

      // sort
      const sorted = [...cryptos].sort((a, b) => {
        let va, vb;
        switch (sortCol) {
          case 'rank':    va = a.rank; vb = b.rank; break;
          case 'price':   va = a.current_price; vb = b.current_price; break;
          case 'change24':va = a.price_change_percentage_24h; vb = b.price_change_percentage_24h; break;
          case 'change7': va = a.change_7d; vb = b.change_7d; break;
          case 'mcap':    va = a.market_cap; vb = b.market_cap; break;
          case 'vol':     va = a.volume_24h; vb = b.volume_24h; break;
          default: va = a.rank; vb = b.rank;
        }
        if (va == null) return 1; if (vb == null) return -1;
        return sortAsc ? va - vb : vb - va;
      });

      tbodyEl.innerHTML = sorted.map(c => `
        <tr data-id="${c.id}">
          <td>
            <div class="coin-cell">
              <span class="rank">${c.rank}</span>
              <div class="coin-info">
                <span class="coin-symbol">${c.symbol}</span>
                <span class="coin-name">${c.name}</span>
              </div>
            </div>
          </td>
          <td class="price">${fmtPrice(c.current_price)}</td>
          <td class="${changeClass(c.price_change_percentage_24h)}">${changeText(c.price_change_percentage_24h)}</td>
          <td class="${changeClass(c.change_7d)}">${changeText(c.change_7d)}</td>
          <td>${fmtBig(c.market_cap)}</td>
          <td>${fmtBig(c.volume_24h)}</td>
        </tr>
      `).join('');

      // update sorted header highlight
      document.querySelectorAll('thead th').forEach(th => {
        th.classList.toggle('sorted', th.dataset.col === sortCol);
      });

      // restore detail panel if still selected
      if (selectedId) {
        const c = cryptos.find(x => x.id === selectedId);
        if (c) renderDetail(c); else closeDetail();
      }
    }

    function renderDetail(c) {
      detailTitle.textContent = `${c.symbol} · ${c.name}`;
      detailGrid.innerHTML = [
        ['Price',      fmtPrice(c.current_price)],
        ['Market Cap', fmtBig(c.market_cap)],
        ['24h Change', `<span class="${changeClass(c.price_change_percentage_24h)}">${changeText(c.price_change_percentage_24h)}</span>`],
        ['7d Change',  `<span class="${changeClass(c.change_7d)}">${changeText(c.change_7d)}</span>`],
        ['30d Change', `<span class="${changeClass(c.change_30d)}">${changeText(c.change_30d)}</span>`],
        ['Volume 24h', fmtBig(c.volume_24h)],
        ['Circulating', c.circulating ? fmt(c.circulating, 0) + ' ' + c.symbol : '—'],
        ['ATH',        fmtPrice(c.ath)],
      ].map(([label, val]) => `
        <div class="detail-item">
          <label>${label}</label>
          <span>${val}</span>
        </div>
      `).join('');
      detailEl.classList.add('open');
    }

    function closeDetail() {
      selectedId = null;
      detailEl.classList.remove('open');
    }

    // ── events ───────────────────────────────────────────────────────────────
    document.getElementById('detail-close').addEventListener('click', closeDetail);

    document.querySelectorAll('thead th').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) { sortAsc = !sortAsc; }
        else { sortCol = col; sortAsc = col === 'rank'; }
        render();
      });
    });

    tbodyEl.addEventListener('click', e => {
      const row = e.target.closest('tr');
      if (!row) return;
      const id = row.dataset.id;
      if (selectedId === id) { closeDetail(); return; }
      selectedId = id;
      const c = cryptos.find(x => x.id === id);
      if (c) renderDetail(c);
    });

    // ── data ingestion ───────────────────────────────────────────────────────
    function ingest(data) {
      if (!data) return;
      // Accept both { cryptos: [...] } and raw array
      const list = Array.isArray(data) ? data : (data.cryptos ?? data.data ?? []);
      if (list.length) {
        cryptos = list;
        render();
      }
    }

    // 1. Initial load from window.openai.toolOutput (injected by Athena)
    if (window.openai?.toolOutput) {
      ingest(window.openai.toolOutput);
    }

    // 2. Listen for subsequent updates (when the widget is re-rendered)
    window.addEventListener('openai:set_globals', (event) => {
      const globals = event.detail?.globals;
      if (globals?.toolOutput) ingest(globals.toolOutput);
    }, { passive: true });

    // 3. Fallback: parse data-cryptos attribute (set by some host integrations)
    if (!cryptos.length) {
      const attr = document.currentScript?.closest('[data-cryptos]')
                ?? document.querySelector('[data-cryptos]');
      if (attr) {
        try { ingest(JSON.parse(attr.dataset.cryptos)); } catch {}
      }
    }

    // If still empty after a short grace period, show empty state
    setTimeout(() => {
      if (!cryptos.length) {
        statusEl.style.display = 'none';
        emptyEl.style.display  = 'block';
      }
    }, 5000);
  </script>
</body>
</html>
